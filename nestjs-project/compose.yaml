services:
  nestjs-api:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - 3000:3000
    volumes:
      - .:/home/node/app
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
      minio:
        condition: service_healthy

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # Consumes the pg-boss `video-process` queue (TD-04). Shares node_modules
    # with the API via the mounted volume — run `npm install` on the API once.
    command: npm run start:worker:dev
    volumes:
      - .:/home/node/app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=streamtube
      - POSTGRES_PASSWORD=streamtube
      - POSTGRES_DB=streamtube
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streamtube"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      # Host ports remapped to avoid a host-side conflict on 9000/9001.
      # In-cluster access (API + worker + tests) is via the Compose network
      # at `minio:9000`, unaffected by the host publish port.
      - "9010:9000"
      - "9011:9001"
    environment:
      - MINIO_ROOT_USER=streamtube
      - MINIO_ROOT_PASSWORD=streamtube
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot job: waits for MinIO and creates the videos bucket. Exits after
  # bootstrapping.
  #
  # NOTE: an AbortIncompleteMultipartUpload lifecycle rule (backstop for
  # abandoned uploads, TD-02/03) is intentionally NOT installed here — this
  # MinIO/mc build rejects an abort-only lifecycle rule (`mc ilm rule add` has
  # no flag for it, and `mc ilm import` fails schema validation). The primary
  # cleanup path is the explicit StorageService.abortMultipartUpload called by
  # POST /videos/:id/abort-upload (SI-03.7). Re-adding the lifecycle backstop is
  # a future enhancement once tooling support is available.
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 streamtube streamtube &&
      mc mb --ignore-existing local/streamtube-videos &&
      echo 'MinIO bucket streamtube-videos ready';
      "

volumes:
  minio-data:
